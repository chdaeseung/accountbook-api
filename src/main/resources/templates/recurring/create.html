<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정기지출 추가</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/recurring-form.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-container">

        <div th:replace="~{fragments/nav :: navbar}"></div>

        <div class="form-page">
            <div class="form-card">
                <div class="form-header">
                    <h2>정기지출 추가</h2>
                    <p>매월 자동으로 발생하는 지출 정보를 입력해주세요.</p>
                    <p th:text="'계좌 개수: ' + ${#lists.size(bankAccounts)}"></p>
                </div>

                <form th:action="@{/recurring}"
                      th:object="${recurringTransactionCreateDto}"
                      method="post"
                      class="recurring-form">

                    <div class="form-group">
                        <label for="memo">구독 서비스</label>
                        <input type="text"
                               id="memo"
                               th:field="*{memo}"
                               placeholder="예: 넷플릭스, 유튜브 프리미엄">
                    </div>

                    <div class="form-group">
                        <label for="amount">금액</label>
                        <input type="number"
                               id="amount"
                               th:field="*{amount}"
                               placeholder="예: 17000">
                    </div>

                    <div class="form-group">
                        <label for="dayOfMonth">결제일</label>
                        <select id="dayOfMonth" th:field="*{dayOfMonth}">
                            <option value="">선택해주세요</option>
                            <option th:each="day : ${#numbers.sequence(1, 31)}"
                                    th:value="${day}"
                                    th:text="|매월 ${day}일|">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="bankAccountId">계좌</label>
                        <select id="bankAccountId" th:field="*{bankAccountId}">
                            <option value="">선택해주세요</option>
                            <option th:each="account : ${bankAccounts}"
                                    th:value="${account.id}"
                                    th:text="${account.accountName}">
                            </option>
                        </select>
                    </div>

                    <p class="form-error"
                       th:if="${errorMessage != null}"
                       th:text="${errorMessage}"></p>

                    <div class="form-actions">
                        <a th:href="@{/recurring}" class="btn btn-secondary">취소</a>
                        <button type="submit" class="btn btn-primary">등록</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
