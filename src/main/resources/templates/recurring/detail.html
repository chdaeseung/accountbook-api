<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정기지출 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/recurring-detail.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-container">

        <div th:replace="~{fragments/nav :: navbar}"></div>

        <div class="detail-page">
            <div class="detail-card">

                <div class="detail-header">
                    <div>
                        <h2 th:text="${#strings.isEmpty(recurringTransaction.memo) ? '기타' : recurringTransaction.memo}">정기지출명</h2>
                        <p>정기지출 상세 정보</p>
                    </div>

                    <div class="detail-header-actions">
                        <a th:href="@{/recurring}" class="btn btn-secondary">목록</a>
                        <a th:href="@{/recurring/{id}/update(id=${recurringTransaction.id})}" class="btn btn-primary">수정</a>
                    </div>
                </div>

                <div class="highlight-card">
                    <span class="highlight-label">매월 결제 금액</span>
                    <strong class="highlight-value"
                            th:text="${#numbers.formatInteger(recurringTransaction.amount, 3, 'COMMA')} + '원'">
                        0원
                    </strong>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">구독 서비스</span>
                        <strong class="info-value"
                                th:text="${#strings.isEmpty(recurringTransaction.memo) ? '기타' : recurringTransaction.memo}">
                            기타
                        </strong>
                    </div>

                    <div class="info-item">
                        <span class="info-label">결제일</span>
                        <strong class="info-value"
                                th:text="|매월 ${recurringTransaction.dayOfMonth}일|">
                            매월 1일
                        </strong>
                    </div>

                    <div class="info-item">
                        <span class="info-label">연결 계좌</span>
                        <strong class="info-value account-with-bank">
                            <span class="account-name"
                                th:text="${recurringTransaction.bankAccountName}">계좌명</span>
                            <span class="bank-name"
                                th:text="${recurringTransaction.bankName}">은행명</span>
                        </strong>
                    </div>
                </div>

                <div class="detail-footer">
                    <form th:action="@{/recurring/{id}/delete(id=${recurringTransaction.id})}"
                          method="post"
                          onsubmit="return confirm('정말 삭제하시겠습니까?');">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>

            </div>
        </div>

    </div>
</div>
</body>
</html>
