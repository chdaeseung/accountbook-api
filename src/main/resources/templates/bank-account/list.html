<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자산 관리</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/asset-dashboard.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-container">

        <div th:replace="~{fragments/nav :: navbar}"></div>

        <div class="dashboard-top-bar">
            <div class="dashboard-summary-inline">
                <div class="summary-item balance">
                    <span class="summary-label">총 자산</span>
                    <span class="summary-value"
                          th:text="${#numbers.formatInteger(totalAsset, 3, 'COMMA')} + '원'"></span>
                </div>

                <div class="summary-item income">
                    <span class="summary-label">이번 달 증가</span>
                    <span class="summary-value"
                          th:text="${#numbers.formatInteger(monthAssetIncrease, 3, 'COMMA')} + '원'"></span>
                </div>

                <div class="summary-item expense">
                    <span class="summary-label">이번 달 감소</span>
                    <span class="summary-value"
                          th:text="${#numbers.formatInteger(monthAssetDecrease, 3, 'COMMA')} + '원'"></span>
                </div>
            </div>
        </div>

        <div class="dashboard-main-top">

            <div class="dashboard-left-top">
                <div class="dashboard-card asset-trend-card top-row-card">
                    <div class="asset-trend-header">
                        <div>
                            <h3>월별 자산 변동</h3>
                        </div>
                    </div>

                    <div class="asset-trend-empty"
                         th:if="${assetTrend == null or assetTrend.isEmpty()}">
                        <p>그래프 데이터가 없습니다</p>
                    </div>

                    <div class="asset-trend-body"
                         th:if="${assetTrend != null and !assetTrend.isEmpty()}">
                        <canvas id="assetTrendChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="dashboard-right-top">
                <div class="dashboard-card right-summary-card top-row-card">
                    <div class="card-header">
                        <h2>보유 자산</h2>
                        <a th:href="@{/bank-account/create}" class="btn-more">계좌 추가</a>
                    </div>

                    <p class="summary-total-text">
                        총 자산:
                        <span th:text="${#numbers.formatInteger(totalAsset, 3, 'COMMA')}"></span>원
                    </p>

                    <div class="asset-share-empty"
                         th:if="${assetShare == null or assetShare.isEmpty()}">
                        <p>계좌 데이터가 없습니다</p>
                    </div>

                    <div class="asset-share-card"
                         th:if="${assetShare != null and !assetShare.isEmpty()}">
                        <div class="asset-pie-wrap">
                            <canvas id="assetShareChart"></canvas>
                        </div>

                        <div class="asset-legend-list">
                            <div class="asset-legend-item"
                                 th:each="item : ${assetShare}">
                                <div class="legend-left">
                                    <span class="legend-dot"
                                          th:style="'background-color:' + ${item.color}"></span>
                                    <span class="legend-name"
                                          th:text="${item.accountName}"></span>
                                </div>
                                <div class="legend-right">
                                    <span class="legend-amount"
                                          th:text="${#numbers.formatInteger(item.balance, 3, 'COMMA')} + '원'"></span>
                                    <span class="legend-percent"
                                          th:text="${item.percent} + '%'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="dashboard-bottom-row">

            <div class="dashboard-card large-card account-list-card">
                <div class="card-header">
                    <h2>전체 계좌 목록</h2>
                    <span class="account-count"
                          th:text="'총 ' + ${bankAccounts.size()} + '개 계좌'"></span>
                </div>

                <table class="dashboard-table account-list-table">
                    <colgroup>
                        <col class="col-bank">
                        <col class="col-account">
                        <col class="col-type">
                        <col class="col-balance">
                        <col class="col-negative">
                    </colgroup>

                    <thead>
                    <tr>
                        <th>은행명</th>
                        <th>계좌명</th>
                        <th>유형</th>
                        <th>잔액</th>
                        <th>마이너스 허용</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(bankAccounts)}">
                        <td colspan="5">등록된 계좌가 없습니다.</td>
                    </tr>

                    <tr th:each="account : ${bankAccounts}"
                        th:onclick="|location.href='@{/bank-account/{id}(id=${account.id})}'|"
                        class="clickable-row">
                        <td th:text="${account.bankName}"></td>
                        <td th:text="${account.accountName}"></td>
                        <td th:text="${account.type.description}"></td>
                        <td th:classappend="${account.balance < 0} ? 'amount-expense' : 'amount-income'"
                            th:text="${#numbers.formatInteger(account.balance, 3, 'COMMA')} + '원'"></td>
                        <td>
                            <span th:if="${account.negativeBalanceAllowed}" class="badge badge-allowed">허용</span>
                            <span th:unless="${account.negativeBalanceAllowed}" class="badge badge-blocked">불가</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="dashboard-card right-summary-card asset-summary-side-card">
                <div class="card-header">
                    <h2>자산 요약</h2>
                </div>

                <div class="asset-summary-grid one-column">
                    <div class="summary-box">
                        <span class="summary-box-label">계좌 수</span>
                        <strong class="summary-box-value"
                                th:text="${bankAccounts.size()} + '개'"></strong>
                    </div>

                    <div class="summary-box">
                        <span class="summary-box-label">마이너스 허용 계좌</span>
                        <strong class="summary-box-value"
                                th:text="${negativeAllowedCount} + '개'"></strong>
                    </div>

                    <div class="summary-box">
                        <span class="summary-box-label">가장 큰 자산 계좌</span>
                        <strong class="summary-box-value"
                                th:text="${largestAccountName}"></strong>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const assetTrend = /*[[${assetTrend}]]*/ [];
    const assetShare = /*[[${assetShare}]]*/ [];

    if (assetTrend && assetTrend.length > 0) {
        const labels = assetTrend.map(item => item.label);
        const data = assetTrend.map(item => item.amount);

        const ctx = document.getElementById('assetTrendChart').getContext('2d');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '총 자산',
                    data: data,
                    fill: true,
                    tension: 0.35,
                    borderWidth: 2.5,
                    borderColor: '#2563eb',
                    backgroundColor: (context) => {
                        const chart = context.chart;
                        const { ctx, chartArea } = chart;
                        if (!chartArea) return 'rgba(37, 99, 235, 0.10)';

                        const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                        gradient.addColorStop(0, 'rgba(37, 99, 235, 0.20)');
                        gradient.addColorStop(1, 'rgba(255, 255, 255, 0.03)');
                        return gradient;
                    },
                    pointRadius: 2,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#2563eb',
                    pointBorderColor: '#2563eb'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: '#111827',
                        titleColor: '#ffffff',
                        bodyColor: '#ffffff',
                        padding: 10,
                        displayColors: false,
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toLocaleString() + '원';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#6b7280'
                        }
                    },
                    y: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        ticks: {
                            color: '#6b7280',
                            callback: function(value) {
                                return value.toLocaleString() + '원';
                            }
                        }
                    }
                }
            }
        });
    }

    if (assetShare && assetShare.length > 0) {
        const labels = assetShare.map(item => item.accountName);
        const data = assetShare.map(item => item.balance);
        const colors = assetShare.map(item => item.color);

        const ctx = document.getElementById('assetShareChart').getContext('2d');

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors,
                    borderColor: '#ffffff',
                    borderWidth: 2,
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '62%',
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: '#111827',
                        titleColor: '#ffffff',
                        bodyColor: '#ffffff',
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed.toLocaleString() + '원';
                            }
                        }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
