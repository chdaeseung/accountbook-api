<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계좌 등록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/bank-account.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-container">
        <div th:replace="~{fragments/nav :: navbar}"></div>

        <div class="form-page">
            <div class="form-card">
                <div class="form-header">
                    <h2>계좌 등록</h2>
                    <p>새로운 계좌 정보를 입력해주세요.</p>
                </div>

                <form th:action="@{/bank-account/create}"
                      th:object="${bankAccountRequestDto}"
                      method="post"
                      class="account-form">

                    <div class="form-group">
                        <label for="bankName">은행명</label>
                        <input type="text" id="bankName" th:field="*{bankName}" placeholder="예: 카카오뱅크">
                        <p class="field-error" th:if="${#fields.hasErrors('bankName')}" th:errors="*{bankName}"></p>
                    </div>

                    <div class="form-group">
                        <label for="accountName">계좌명</label>
                        <input type="text" id="accountName" th:field="*{accountName}" placeholder="예: 생활비 통장">
                        <p class="field-error" th:if="${#fields.hasErrors('accountName')}" th:errors="*{accountName}"></p>
                    </div>

                    <div class="form-group">
                        <label for="balance">현재 잔액</label>
                        <input type="number" id="balance" th:field="*{balance}" placeholder="예: 1000000">
                        <p class="field-error" th:if="${#fields.hasErrors('balance')}" th:errors="*{balance}"></p>
                    </div>

                    <div class="form-group">
                        <label for="type">계좌 유형</label>
                        <select id="type" th:field="*{type}">
                            <option value="">선택해주세요</option>
                            <option th:each="type : ${types}"
                                    th:value="${type}"
                                    th:text="${type.description}">
                            </option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
                    </div>

                    <div class="form-check-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{negativeBalanceAllowed}">
                            마이너스 통장 허용
                        </label>
                        <p class="field-description">체크하면 잔액이 0원 아래로 내려갈 수 있습니다.</p>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/bank-account}" class="btn btn-secondary">취소</a>
                        <button type="submit" class="btn btn-primary">등록</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
