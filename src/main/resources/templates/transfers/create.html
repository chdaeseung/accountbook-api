<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계좌 이체</title>
</head>
<body>
<h1>계좌 이체</h1>

<form th:action="@{/transfers/create}" th:object="${transferRequestDto}" method="post">

    <div>
        <label>이체 날짜</label>
        <input type="date" th:field="*{date}">
    </div>

    <div>
        <label>출금 계좌</label>
        <select th:field="*{fromAccountId}">
            <option value="">선택하세요</option>
            <option th:each="account : ${bankAccounts}"
                    th:value="${account.id}"
                    th:text="${account.accountName}">
            </option>
        </select>
    </div>

    <div>
        <label>입금 계좌</label>
        <select th:field="*{toAccountId}">
            <option value="">선택하세요</option>
            <option th:each="account : ${bankAccounts}"
                    th:value="${account.id}"
                    th:text="${account.accountName}">
            </option>
        </select>
    </div>

    <div>
        <label>금액</label>
        <input type="number" th:field="*{amount}">
    </div>

    <div>
        <label>메모</label>
        <input type="text" th:field="*{memo}">
    </div>

    <div>
        <button type="submit">이체하기</button>
    </div>
</form>

</body>
</html>
