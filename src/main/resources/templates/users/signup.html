<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page-shell">
    <div class="page-container auth-container">

        <div class="auth-card signup-card">
            <div class="auth-header">
                <h1>회원가입</h1>
                <p>가계부 서비스를 이용하기 위한 계정을 만들어보세요.</p>
            </div>

            <form th:action="@{/users/signup}"
                  th:object="${signupRequestDto}"
                  method="post"
                  class="auth-form">

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email"
                           id="email"
                           th:field="*{email}"
                           placeholder="이메일을 입력해주세요">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"></p>
                </div>

                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text"
                           id="username"
                           th:field="*{username}"
                           placeholder="아이디를 입력해주세요">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('username')}"
                       th:errors="*{username}"></p>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           placeholder="비밀번호를 입력해주세요">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"></p>
                </div>

                <div class="form-group">
                    <label for="passwordConfirm">비밀번호 확인</label>
                    <input type="password"
                           id="passwordConfirm"
                           th:field="*{passwordConfirm}"
                           placeholder="비밀번호를 다시 입력해주세요">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('passwordConfirm')}"
                       th:errors="*{passwordConfirm}"></p>
                </div>

                <p class="form-error"
                   th:if="${errorMessage != null}"
                   th:text="${errorMessage}"></p>

                <button type="submit" class="auth-submit-btn">회원가입</button>
            </form>

            <div class="auth-footer">
                <span>이미 계정이 있으신가요?</span>
                <a th:href="@{/users/login}">로그인</a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
